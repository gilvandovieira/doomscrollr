services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doomscrollr
      POSTGRES_USER: doomscrollr
      POSTGRES_PASSWORD: doomscrollr
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doomscrollr -d doomscrollr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
