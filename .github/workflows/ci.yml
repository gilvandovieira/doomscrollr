name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: doomscrollr
          POSTGRES_USER: doomscrollr
          POSTGRES_PASSWORD: doomscrollr
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U doomscrollr -d doomscrollr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Cache dependencies with frozen lockfile
        run: deno cache --frozen --lock=deno.lock apps/api/src/main.ts apps/web/src/main.tsx packages/database/src/migrate.ts

      - name: Format
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Unit tests
        run: deno task test

      - name: Web build
        run: deno task build:web

      - name: API e2e tests
        run: deno task test:e2e
        env:
          E2E_BASE_DATABASE_URL: postgres://doomscrollr:doomscrollr@localhost:5433/doomscrollr
