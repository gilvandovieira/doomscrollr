<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1014" />
    <title>Doomscrollr offline</title>
    <style>
      :root {
        color-scheme: dark;
        --page: #0f1014;
        --paper: #171922;
        --line: rgb(255 255 255 / 0.13);
        --ink: #f5f6fb;
        --muted: rgb(245 246 251 / 0.66);
        --signal: #7a73ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        place-items: center;
        background:
          linear-gradient(180deg, rgb(122 115 255 / 0.14), transparent 32%),
          var(--page);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
        padding: calc(1.5rem + env(safe-area-inset-top)) 1rem
          calc(1.5rem + env(safe-area-inset-bottom));
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--paper);
        box-shadow: 0 24px 80px rgb(0 0 0 / 0.38);
        padding: 1.25rem;
      }

      .mark {
        display: grid;
        width: 2.6rem;
        height: 2.6rem;
        place-items: center;
        border-radius: 0.8rem;
        background: var(--signal);
      }

      svg {
        width: 1.35rem;
        height: 1.35rem;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(1.7rem, 8vw, 2.3rem);
        line-height: 1;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0.75rem 0 0;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 2.75rem;
        align-items: center;
        justify-content: center;
        margin-top: 1.15rem;
        border: 1px solid transparent;
        border-radius: 12px;
        background: var(--signal);
        color: #fff;
        padding: 0 1rem;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m7 8 5 5 5-5" />
          <path d="m7 15 5 5 5-5" />
        </svg>
      </div>
      <h1>You are offline</h1>
      <p>Doomscrollr cached the app shell, but this page still needs a connection.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
